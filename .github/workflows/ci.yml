name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install root dependencies
        run: npm install

      - name: Lint
        run: npm run lint

  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        gateway: [discord-gateway, slack-gateway, email-gateway, whatsapp-gateway]

    defaults:
      run:
        working-directory: ${{ matrix.gateway }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: ${{ matrix.gateway }}/package-lock.json

      # Each gateway's tsc compiles the shared packages/common sources via
      # tsconfig paths, so common's own deps (e.g. express) must be present.
      # The per-gateway `npm ci` below doesn't install them — install the
      # workspace root first so they resolve from the hoisted node_modules.
      - name: Install workspace deps (shared common)
        working-directory: ${{ github.workspace }}
        run: npm ci

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run typecheck --if-present

      - name: Test
        run: npm test --if-present
